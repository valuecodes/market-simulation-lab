name: CI

on:
  push:
    branches: [main]
  pull_request:

# Deny all by default; each job opts into the minimum it needs.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      # Pinned to a full commit SHA (supply-chain hardening); comment records the tag.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: ./.github/actions/setup
      - run: uv run poe lint

  format-check:
    name: format-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: ./.github/actions/setup
      - run: uv run poe fmt-check

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: ./.github/actions/setup
      - run: uv run poe typecheck

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # Version matrix lives only here — lint/format/typecheck are
        # version-independent and run once above.
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv run poe test
