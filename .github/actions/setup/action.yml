name: "Setup Python + uv"
description: "Install uv, provision Python, and sync dependencies (dev extras)"

inputs:
  python-version:
    description: "Python version to install"
    required: false
    default: "3.12"

runs:
  using: composite
  steps:
    # Pinned to a full commit SHA (supply-chain hardening); comment records the tag.
    - name: Install uv
      uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
      with:
        python-version: ${{ inputs.python-version }}
        enable-cache: true

    - name: Install dependencies
      shell: bash
      run: uv sync --extra dev
